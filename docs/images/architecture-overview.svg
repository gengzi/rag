<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="core" x1="170" y1="210" x2="1030" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94A3B8"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #CBD5E1; }
      .section { font: 700 18px Arial, Helvetica, sans-serif; fill: #F8FAFC; }
      .label { font: 600 16px Arial, Helvetica, sans-serif; fill: #F8FAFC; }
      .small { font: 400 13px Arial, Helvetica, sans-serif; fill: #CBD5E1; }
      .tiny { font: 400 12px Arial, Helvetica, sans-serif; fill: #94A3B8; }
      .box { fill: #1E293B; stroke: #334155; stroke-width: 1.2; rx: 18; filter: url(#shadow); }
      .box2 { fill: #0F172A; stroke: #475569; stroke-width: 1.2; rx: 16; }
      .storage { fill: #111827; stroke: #64748B; stroke-width: 1.2; rx: 16; }
      .line { stroke: #94A3B8; stroke-width: 2; marker-end: url(#arrow); }
      .softline { stroke: #64748B; stroke-width: 1.6; stroke-dasharray: 5 5; marker-end: url(#arrow); }
      .pill { fill: #020617; stroke: #334155; stroke-width: 1; rx: 18; }
    </style>
  </defs>

  <rect width="1200" height="680" rx="28" fill="url(#bg)"/>

  <text x="600" y="58" text-anchor="middle" class="title">RAG Platform Architecture</text>
  <text x="600" y="88" text-anchor="middle" class="subtitle">Spring AI · Java RAG · Agent Orchestration · GraphRAG · MCP · Multi-Agent Teams</text>

  <rect x="70" y="125" width="170" height="78" class="box"/>
  <text x="155" y="156" text-anchor="middle" class="label">User / Web UI</text>
  <text x="155" y="180" text-anchor="middle" class="small">Chat · Upload · Workflow</text>

  <rect x="505" y="120" width="190" height="90" class="box"/>
  <text x="600" y="153" text-anchor="middle" class="label">rag-chat</text>
  <text x="600" y="177" text-anchor="middle" class="small">SSE · Message Persistence</text>
  <text x="600" y="195" text-anchor="middle" class="tiny">Agent Router · Stream Recovery</text>

  <line x1="240" y1="164" x2="505" y2="164" class="line"/>

  <rect x="165" y="250" width="870" height="250" rx="28" fill="url(#core)" opacity="0.18" stroke="#334155"/>
  <text x="600" y="280" text-anchor="middle" class="section">Core AI Application Modules</text>

  <rect x="205" y="315" width="145" height="115" class="box2"/>
  <text x="277" y="348" text-anchor="middle" class="label">rag-core</text>
  <text x="277" y="373" text-anchor="middle" class="small">Knowledge Base</text>
  <text x="277" y="393" text-anchor="middle" class="small">Vector Retrieval</text>
  <text x="277" y="413" text-anchor="middle" class="tiny">RAG · Evaluation</text>

  <rect x="385" y="315" width="145" height="115" class="box2"/>
  <text x="457" y="348" text-anchor="middle" class="label">rag-agent</text>
  <text x="457" y="373" text-anchor="middle" class="small">Agent Graph</text>
  <text x="457" y="393" text-anchor="middle" class="small">PPT · Text2SQL</text>
  <text x="457" y="413" text-anchor="middle" class="tiny">Resume · Workflow</text>

  <rect x="565" y="315" width="145" height="115" class="box2"/>
  <text x="637" y="348" text-anchor="middle" class="label">rag-graph</text>
  <text x="637" y="373" text-anchor="middle" class="small">GraphRAG</text>
  <text x="637" y="393" text-anchor="middle" class="small">Neo4j Graph</text>
  <text x="637" y="413" text-anchor="middle" class="tiny">Entity · Trace</text>

  <rect x="745" y="315" width="145" height="115" class="box2"/>
  <text x="817" y="348" text-anchor="middle" class="label">rag-mcp</text>
  <text x="817" y="373" text-anchor="middle" class="small">MCP Server</text>
  <text x="817" y="393" text-anchor="middle" class="small">Memory · Tools</text>
  <text x="817" y="413" text-anchor="middle" class="tiny">SSE Endpoint</text>

  <rect x="925" y="315" width="145" height="115" class="box2"/>
  <text x="997" y="348" text-anchor="middle" class="label">agent-teams</text>
  <text x="997" y="373" text-anchor="middle" class="small">Team / Task</text>
  <text x="997" y="393" text-anchor="middle" class="small">Multi-Agent</text>
  <text x="997" y="413" text-anchor="middle" class="tiny">Workflow Events</text>

  <line x1="600" y1="210" x2="600" y2="250" class="line"/>
  <line x1="600" y1="250" x2="277" y2="315" class="softline"/>
  <line x1="600" y1="250" x2="457" y2="315" class="softline"/>
  <line x1="600" y1="250" x2="637" y2="315" class="softline"/>
  <line x1="600" y1="250" x2="817" y2="315" class="softline"/>
  <line x1="600" y1="250" x2="997" y2="315" class="softline"/>

  <rect x="70" y="550" width="150" height="70" class="storage"/>
  <text x="145" y="580" text-anchor="middle" class="label">MySQL</text>
  <text x="145" y="604" text-anchor="middle" class="small">Users · Docs · Msg</text>

  <rect x="250" y="550" width="165" height="70" class="storage"/>
  <text x="332" y="580" text-anchor="middle" class="label">ES / OpenSearch</text>
  <text x="332" y="604" text-anchor="middle" class="small">Chunks · Vectors</text>

  <rect x="445" y="550" width="150" height="70" class="storage"/>
  <text x="520" y="580" text-anchor="middle" class="label">Redis</text>
  <text x="520" y="604" text-anchor="middle" class="small">SSE · Lock</text>

  <rect x="625" y="550" width="150" height="70" class="storage"/>
  <text x="700" y="580" text-anchor="middle" class="label">Neo4j</text>
  <text x="700" y="604" text-anchor="middle" class="small">Entity Graph</text>

  <rect x="805" y="550" width="150" height="70" class="storage"/>
  <text x="880" y="580" text-anchor="middle" class="label">MinIO / S3</text>
  <text x="880" y="604" text-anchor="middle" class="small">Original Files</text>

  <rect x="985" y="550" width="145" height="70" class="storage"/>
  <text x="1057" y="580" text-anchor="middle" class="label">LLM Provider</text>
  <text x="1057" y="604" text-anchor="middle" class="small">Chat · Embedding</text>

  <line x1="277" y1="430" x2="145" y2="550" class="softline"/>
  <line x1="277" y1="430" x2="332" y2="550" class="softline"/>
  <line x1="600" y1="210" x2="520" y2="550" class="softline"/>
  <line x1="637" y1="430" x2="700" y2="550" class="softline"/>
  <line x1="277" y1="430" x2="880" y2="550" class="softline"/>
  <line x1="817" y1="430" x2="1057" y2="550" class="softline"/>

  <rect x="88" y="635" width="1024" height="28" class="pill"/>
  <text x="600" y="654" text-anchor="middle" class="tiny">Enterprise-oriented Java AI backend reference: RAG + Agent + Graph + MCP + Memory + SSE + Multi-Agent Collaboration</text>
</svg>
